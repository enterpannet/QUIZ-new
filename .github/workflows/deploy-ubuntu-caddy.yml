# Deploy ไฟล์ static (`dist/` หลัง Vite build) ไปยัง Ubuntu ผ่าน rsync over SSH — เสิร์ฟด้วย Caddy
# Caddy example: deploy/ubuntu-caddy.Caddyfile.example
#
# ตั้งใน GitHub: Repo → Settings → Secrets and variables → Actions
# ⚠️ แยกให้ถูก:
#   - DEPLOY_REMOTE_PATH อยู่แท็บ "Variables" (ไม่ใช่ Secrets)
#   - ชื่อเหล่านี้อยู่แท็บ "Repository secrets"
#
# Secrets:
#   DEPLOY_HOST       — เช่น deploy.example.com
#   DEPLOY_USER       — user SSH เช่น deploy
#   DEPLOY_SSH_KEY    — private key แบบ multiline (OpenSSH PEM / ed25519)
#   VITE_KIOSK_METRICS_ENDPOINT — URL production เช่น https://api2.example.com/v1/events
#
# Variables:
#   DEPLOY_REMOTE_PATH — เป้าหมายบนเซิร์ฟเวอร์ ไม่มีท้าย / เช่น /var/www/quiz
#
# Optional variables:
#   DEPLOY_SSH_PORT   — พอร์ต SSH (ค่าเริ่มต้น 22)
#
# บน Ubuntu: ให้ user deploy เขียนโฟลเดอร์นั้นได้ ; reload caddy เช่น
#   deploy ALL=(ALL) NOPASSWD: /bin/systemctl reload caddy
#
name: Deploy to Ubuntu (Caddy)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ubuntu-caddy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        env:
          VITE_BASE_PATH: /
          VITE_KIOSK_METRICS_ENDPOINT: ${{ secrets.VITE_KIOSK_METRICS_ENDPOINT }}
        run: bun run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Verify deploy secrets & variables
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE: ${{ vars.DEPLOY_REMOTE_PATH }}
        run: |
          MISSING=""
          VARIABLES_PAGE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/settings/variables/actions"
          SECRETS_PAGE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/settings/secrets/actions"
          [ -z "${HOST}" ] && MISSING="${MISSING}"$'\n'"  • DEPLOY_HOST (repository secret)"
          [ -z "${SSH_USER}" ] && MISSING="${MISSING}"$'\n'"  • DEPLOY_USER (repository secret)"
          [ -z "${REMOTE}" ] && MISSING="${MISSING}"$'\n'"  • DEPLOY_REMOTE_PATH (repository variable — แท็บ Variables เท่านั้น)"
          if ! [ -s "$HOME/.ssh/deploy_key" ]; then
            MISSING="${MISSING}"$'\n'"  • DEPLOY_SSH_KEY (repository secret — ต้องไม่ว่าง)"
          fi
          if [ -n "$MISSING" ]; then
            echo "::group:: Deploy configuration incomplete"
            echo "ยังขาดหรือว่างอยู่:${MISSING}"
            echo ""
            echo "Secrets: $SECRETS_PAGE"
            echo "Variables (สำหรับ DEPLOY_REMOTE_PATH): $VARIABLES_PAGE"
            echo ""
            echo "ตัวอย่าง DEPLOY_REMOTE_PATH: /var/www/quiz"
            echo "::endgroup::"
            echo "::error::ตั้ง repository Secrets + Variable ให้ครบแล้วรันใหม่"
            exit 1
          fi

      - name: Deploy (rsync)
        env:
          SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE: ${{ vars.DEPLOY_REMOTE_PATH }}
        run: |
          set -euo pipefail
          ssh-keyscan -p "$SSH_PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          RSHELL="ssh -p ${SSH_PORT} -i ${HOME}/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          REMOTE_Q="$(printf '%q' "$REMOTE")"
          $RSHELL "${SSH_USER}@${HOST}" "mkdir -p ${REMOTE_Q}"

          rsync -az --delete \
            --exclude '.DS_Store' \
            -e "$RSHELL" \
            dist/ "${SSH_USER}@${HOST}:${REMOTE}/"

      - name: Reload Caddy (optional)
        env:
          SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        continue-on-error: true
        run: |
          RSHELL="ssh -p ${SSH_PORT} -i ${HOME}/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          $RSHELL "${SSH_USER}@${HOST}" 'sudo systemctl reload caddy'
